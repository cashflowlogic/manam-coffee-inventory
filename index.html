<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tea Shop" />
<meta name="theme-color" content="#1A5E3A" />
<title>Tea Shop Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --green-dark: #1A5E3A;
    --green-mid: #2E7D52;
    --green-light: #E8F5E9;
    --green-pale: #F1FAF4;
    --amber: #F9A825;
    --amber-light: #FFF8E1;
    --red: #C62828;
    --red-light: #FFEBEE;
    --text: #1C2B22;
    --text-mid: #4A6355;
    --text-soft: #7A9688;
    --surface: #FFFFFF;
    --bg: #F4F7F5;
    --border: rgba(26,94,58,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* TOP BAR */
  .topbar {
    background: var(--green-dark);
    padding: 52px 20px 18px;
    position: relative;
    overflow: hidden;
  }
  .topbar::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .topbar::after {
    content: '';
    position: absolute;
    bottom: -20px; right: 30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .topbar-label { font-size: 11px; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 500; }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: #fff; margin-top: 2px; line-height: 1.1; }
  .topbar-date { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px; }

  /* SUMMARY STRIP */
  .summary-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-cell {
    background: var(--surface);
    padding: 12px 14px;
    text-align: center;
  }
  .summary-val { font-size: 20px; font-weight: 600; color: var(--green-dark); }
  .summary-lbl { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  /* NAV */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .nav-btn {
    flex: 1; padding: 12px 4px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    border: none; background: transparent;
    cursor: pointer; color: var(--text-soft);
    border-bottom: 2.5px solid transparent;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }
  .nav-btn svg { display: block; margin: 0 auto 3px; }
  .nav-btn.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }

  /* SCREENS */
  .screen { display: none; padding: 16px; flex-direction: column; gap: 10px; padding-bottom: 32px; }
  .screen.active { display: flex; }

  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-soft);
    padding: 4px 0 2px;
  }

  /* PRODUCT CARDS */
  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .product-card:active { box-shadow: 0 2px 12px rgba(26,94,58,0.1); }

  .product-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 16px; cursor: pointer;
  }
  .product-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-right: 12px; flex-shrink: 0;
  }
  .product-info { flex: 1; }
  .product-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .product-meta { font-size: 11px; color: var(--text-soft); margin-top: 2px; }

  .stock-badge {
    font-size: 12px; font-weight: 600;
    padding: 5px 10px; border-radius: 20px;
    background: var(--green-light); color: var(--green-dark);
    white-space: nowrap;
  }
  .stock-badge.low { background: var(--amber-light); color: #8B5E00; }
  .stock-badge.critical { background: var(--red-light); color: var(--red); }

  .product-body {
    display: none; flex-direction: column; gap: 14px;
    border-top: 1px solid var(--border);
    padding: 16px;
    background: var(--green-pale);
  }
  .product-body.open { display: flex; }

  .field-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-mid);
    margin-bottom: 6px;
  }
  .field-hint { font-size: 11px; color: var(--text-soft); margin-bottom: 8px; }

  .input-row { display: flex; gap: 10px; align-items: center; }
  .qty-wrap { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); overflow: hidden; }
  .qty-btn {
    width: 36px; height: 42px; border: none; background: transparent;
    font-size: 20px; cursor: pointer; color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-weight: 300; flex-shrink: 0;
  }
  .qty-btn:active { background: var(--green-light); }
  .qty-input {
    width: 52px; height: 42px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px; font-weight: 600;
    text-align: center; color: var(--text);
    background: transparent; outline: none;
  }
  .qty-unit { font-size: 12px; color: var(--text-soft); flex-shrink: 0; }
  .qty-converted {
    font-size: 12px; color: var(--green-mid); font-weight: 500;
    background: var(--green-light); padding: 4px 8px;
    border-radius: 6px; white-space: nowrap;
  }

  .update-btn {
    width: 100%; padding: 13px;
    background: var(--green-dark); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
    transition: background 0.15s;
  }
  .update-btn:active { background: var(--green-mid); }
  .update-btn:disabled { background: #ccc; cursor: default; }

  /* LOG SCREEN */
  .log-empty { text-align: center; padding: 40px 20px; color: var(--text-soft); font-size: 14px; }
  .log-day-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-soft); padding: 8px 0 4px; }
  .log-item {
    background: var(--surface); border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px; margin-bottom: 6px;
  }
  .log-product { font-size: 13px; font-weight: 600; color: var(--text); }
  .log-detail { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
  .log-pcs { font-size: 14px; font-weight: 700; }
  .log-pcs.in { color: var(--green-dark); }
  .log-pcs.out { color: var(--red); }

  /* MANAGE SCREEN */
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px;
    background: var(--green-dark); color: #fff;
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .add-btn:active { background: var(--green-mid); }

  .manage-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 13px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .manage-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-mid);
  }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.del { color: var(--red); border-color: #ffcdd2; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed;
    inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 18px; }

  .form-field { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 11px 13px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--text); background: var(--surface); outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--green-mid); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn {
    flex: 1; padding: 13px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  }
  .modal-btn.cancel { border: 1.5px solid var(--border); background: transparent; color: var(--text-mid); }
  .modal-btn.save { border: none; background: var(--green-dark); color: #fff; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.3s; z-index: 300; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* CHEVRON */
  .chevron { transition: transform 0.2s; color: var(--text-soft); }
  .chevron.open { transform: rotate(180deg); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-label">Inventory</div>
  <div class="topbar-title">Tea Shop ☕</div>
  <div class="topbar-date" id="topbar-date"></div>

<button onclick="resetInventory()" style="margin-top:10px;padding:8px 14px;border:none;border-radius:8px;background:white;color:#1A5E3A;font-weight:600;cursor:pointer;">
  Reset Inventory
</button>
</div>

<div class="summary-strip">
  <div class="summary-cell">
    <div class="summary-val" id="sum-total">0</div>
    <div class="summary-lbl">Total pieces</div>
  </div>
  <div class="summary-cell">
    <div class="summary-val" id="sum-products">0</div>
    <div class="summary-lbl">Products</div>
  </div>
  <div class="summary-cell">
    <div class="summary-val" id="sum-low">0</div>
    <div class="summary-lbl">Low stock</div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nav-stock" onclick="showScreen('stock')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Stock
  </button>
  <button class="nav-btn" id="nav-log" onclick="showScreen('log')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    Log
  </button>
  <button class="nav-btn" id="nav-manage" onclick="showScreen('manage')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    Products
  </button>
</nav>

<!-- STOCK SCREEN -->
<div class="screen active" id="screen-stock">
  <div class="section-label">All products</div>
  <div id="product-list"></div>
</div>

<!-- LOG SCREEN -->
<div class="screen" id="screen-log">
  <div id="log-list"></div>
</div>

<!-- MANAGE SCREEN -->
<div class="screen" id="screen-manage">
  <button class="add-btn" onclick="openModal()">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add product
  </button>
  <div class="section-label">Your products</div>
  <div id="manage-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add product</div>

    <div class="form-field">
      <label class="form-label">Product name</label>
      <input class="form-input" id="f-name" placeholder="e.g. Osmania" />
    </div>

    <div class="form-field">
      <label class="form-label">Pack type</label>
      <select class="form-select" id="f-type" onchange="togglePackType()">
        <option value="carton">Carton → Packets → Pieces</option>
        <option value="box">Box → Units (sticks, etc.)</option>
      </select>
    </div>

    <div id="carton-fields">
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Packets per carton</label>
          <input class="form-input" id="f-packets" type="number" min="1" placeholder="30" />
        </div>
        <div class="form-field">
          <label class="form-label">Pieces per packet</label>
          <input class="form-input" id="f-pcs" type="number" min="1" placeholder="24" />
        </div>
      </div>
    </div>

    <div id="box-fields" style="display:none;">
      <div class="form-field">
        <label class="form-label">Units per box</label>
        <input class="form-input" id="f-units" type="number" min="1" placeholder="20" />
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">Low stock alert (pieces)</label>
      <input class="form-input" id="f-threshold" type="number" min="0" placeholder="50" />
    </div>

    <div class="form-field">
      <label class="form-label">Icon</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;" id="icon-picker">
        <span>🍪</span><span>🥐</span><span>🍩</span><span>🍫</span><span>🥜</span><span>🌰</span><span>🫖</span><span>☕</span><span>🥛</span><span>🧁</span>
      </div>
    </div>

    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveProduct()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = [], log = [], editingId = null, selectedIcon = '🍪';

const ICONS = ['🍪','🥐','🍩','🍫','🥜','🌰','🫖','☕','🥛','🧁'];

function loadData() {
  try { products = JSON.parse(localStorage.getItem('ts2_products') || 'null') || defaultProducts(); } catch(e){ products = defaultProducts(); }
  try { log = JSON.parse(localStorage.getItem('ts2_log') || '[]'); } catch(e){ log = []; }
}

function defaultProducts() {
  return [
    {
      id:1,
      name:'Osmania Biscuits',
      type:'carton',
      packets:30,
      pcs:24,
      stock:720,
      threshold:100,
      icon:'🍪',
      lastUpdated:'Never'
    },
    {
      id:2,
      name:'Rusk',
      type:'carton',
      packets:120,
      pcs:18,
      stock:500,
      threshold:150,
      icon:'🥐',
      lastUpdated:'Never'
    },
    {
      id:3,
      name:'Almond Sticks',
      type:'box',
      units:20,
      stock:100,
      threshold:20,
      icon:'🌰',
      lastUpdated:'Never'
    },
    {
      id:4,
      name:'Cashew Sticks',
      type:'box',
      units:20,
      stock:80,
      threshold:20,
      icon:'🥜',
      lastUpdated:'Never'
    },
    {
      id:5,
      name:'Choco Sticks',
      type:'box',
      units:20,
      stock:120,
      threshold:20,
      icon:'🍫',
      lastUpdated:'Never'
    },
    {
      id:6,
      name:'Tea Powder',
      type:'box',
      units:50,
      stock:200,
      threshold:50,
      icon:'🫖',
      lastUpdated:'Never'
    },
    {
      id:7,
      name:'Coffee Cups',
      type:'box',
      units:100,
      stock:1000,
      threshold:200,
      icon:'☕',
      lastUpdated:'Never'
    }
  ];
}

function saveData() {
  localStorage.setItem('ts2_products', JSON.stringify(products));
  localStorage.setItem('ts2_log', JSON.stringify(log));
}

function ppb(p) { return p.type === 'carton' ? p.packets * p.pcs : p.units; }
function ppc(p) { return p.type === 'carton' ? p.pcs : 1; }
function unitLabel(p) { return p.type === 'carton' ? 'cartons' : 'boxes'; }
function dispLabel(p) { return p.type === 'carton' ? 'packets' : 'units'; }
function metaStr(p) { return p.type === 'carton' ? `1 carton = ${p.packets} pkts × ${p.pcs} pcs` : `1 box = ${p.units} units`; }

function lastUpdStr(p) {
  return p.lastUpdated || 'Never updated';
}

function badgeClass(p) {
  if (p.stock <= 0) return 'critical';
  if (p.stock <= (p.threshold || 50)) return 'low';
  return '';
}

function renderStock() {
  const total = products.reduce((a,p) => a+p.stock, 0);
  const low = products.filter(p => p.stock <= (p.threshold||50)).length;
  document.getElementById('sum-total').textContent = total.toLocaleString();
  document.getElementById('sum-products').textContent = products.length;
  document.getElementById('sum-low').textContent = low;

  document.getElementById('product-list').innerHTML = products.map(p => `
    <div class="product-card" style="margin-bottom:10px;">
      <div class="product-header" onclick="toggleCard(${p.id}, this)">
        <div class="product-icon">${p.icon||'🍪'}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-meta">${metaStr(p)}</div>
          <div class="product-meta" style="margin-top:3px;font-size:10px;color:var(--text-soft);">🕐 ${lastUpdStr(p)}</div>
        </div>
        <span class="stock-badge ${badgeClass(p)}">${p.stock.toLocaleString()} pcs</span>
        <svg class="chevron" style="margin-left:8px;flex-shrink:0;" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="product-body" id="body-${p.id}">
        <div>
          <div class="field-label">📦 Purchase received</div>
          <div class="field-hint">How many ${unitLabel(p)} did you receive today?</div>
          <div class="input-row">
            <div class="qty-wrap">
              <button class="qty-btn" onclick="adj('buy-${p.id}',-1)">−</button>
              <input class="qty-input" id="buy-${p.id}" type="number" min="0" value="0" oninput="calcConvert(${p.id})" />
              <button class="qty-btn" onclick="adj('buy-${p.id}',1)">+</button>
            </div>
            <span class="qty-unit">${unitLabel(p)}</span>
            <span class="qty-converted" id="buy-conv-${p.id}"></span>
          </div>
        </div>
        <div>
          <div class="field-label">🚚 Dispatched today</div>
          <div class="field-hint">How many ${dispLabel(p)} sent out today?</div>
          <div class="input-row">
            <div class="qty-wrap">
              <button class="qty-btn" onclick="adj('snd-${p.id}',-1)">−</button>
              <input class="qty-input" id="snd-${p.id}" type="number" min="0" value="0" oninput="calcConvert(${p.id})" />
              <button class="qty-btn" onclick="adj('snd-${p.id}',1)">+</button>
            </div>
            <span class="qty-unit">${dispLabel(p)}</span>
            <span class="qty-converted" id="snd-conv-${p.id}"></span>
          </div>
        </div>
        <button class="update-btn" onclick="applyUpdate(${p.id})">Update Stock</button>
      </div>
    </div>
  `).join('');
}

function adj(id, delta) {
  const el = document.getElementById(id);
  const val = Math.max(0, (parseInt(el.value)||0) + delta);
  el.value = val;
  const pid = parseInt(id.split('-')[1]);
  calcConvert(pid);
}

function calcConvert(pid) {
  const p = products.find(x => x.id===pid);
  const buyVal = Math.max(0, parseInt(document.getElementById('buy-'+pid)?.value)||0);
  const sndVal = Math.max(0, parseInt(document.getElementById('snd-'+pid)?.value)||0);
  const buyPcs = buyVal * ppb(p);
  const sndPcs = sndVal * ppc(p);
  const bc = document.getElementById('buy-conv-'+pid);
  const sc = document.getElementById('snd-conv-'+pid);
  if (bc) bc.textContent = buyPcs ? `= ${buyPcs.toLocaleString()} pcs` : '';
  if (sc) sc.textContent = sndPcs ? `= ${sndPcs.toLocaleString()} pcs` : '';
}

function toggleCard(pid, headerEl) {
  const body = document.getElementById('body-'+pid);
  const chev = headerEl.querySelector('.chevron');
  const isOpen = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open', isOpen);
}

function applyUpdate(pid) {
  const p = products.find(x => x.id===pid);

  const buyVal = Math.max(0, parseInt(document.getElementById('buy-'+pid)?.value) || 0);
  const sndVal = Math.max(0, parseInt(document.getElementById('snd-'+pid)?.value) || 0);

  const buyPcs = buyVal * ppb(p);
  const sndPcs = sndVal * ppc(p);

  if (!buyPcs && !sndPcs) {
    showToast('Nothing to update');
    return;
  }

  const now = new Date();

  const dateStr = now.toLocaleDateString('en-GB', {
    day:'2-digit',
    month:'short',
    year:'numeric'
  });

  const timeStr = now.toLocaleTimeString('en-GB', {
    hour:'2-digit',
    minute:'2-digit'
  });

  p.stock = Math.max(0, p.stock + buyPcs - sndPcs);
  p.lastUpdated = `${dateStr} ${timeStr}`;

  if (buyPcs) {
    log.unshift({
      type:'in',
      product:p.name,
      icon:p.icon || '🍪',
      pcs:buyPcs,
      detail:`${buyVal} ${unitLabel(p)} received`,
      date:dateStr,
      time:timeStr
    });
  }

  if (sndPcs) {
    log.unshift({
      type:'out',
      product:p.name,
      icon:p.icon || '🍪',
      pcs:sndPcs,
      detail:`${sndVal} ${dispLabel(p)} dispatched`,
      date:dateStr,
      time:timeStr
    });
  }

  if (log.length > 200) {
    log = log.slice(0, 200);
  }

  saveData();

  document.getElementById('buy-'+pid).value = 0;
  document.getElementById('snd-'+pid).value = 0;
  document.getElementById('buy-conv-'+pid).textContent = '';
  document.getElementById('snd-conv-'+pid).textContent = '';

  document.getElementById('body-'+pid).classList.remove('open');

  renderStock();
  renderLog();
  renderManage();

  showToast(`${p.name} updated successfully ✓`);
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!log.length) { el.innerHTML = '<div class="log-empty">No activity yet.<br>Update stock to see your history here.</div>'; return; }
  let html = '', lastDate = '';
  log.slice(0,60).forEach(l => {
    if (l.date !== lastDate) {
      html += `<div class="log-day-label">${l.date}</div>`;
      lastDate = l.date;
    }
    html += `
      <div class="log-item">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">${l.icon||'🍪'}</span>
          <div>
            <div class="log-product">${l.product}</div>
            <div class="log-detail">${l.detail} · ${l.time||''}</div>
          </div>
        </div>
        <div class="log-pcs ${l.type}">${l.type==='in'?'+':'−'}${l.pcs.toLocaleString()}</div>
      </div>`;
  });
  el.innerHTML = html;
}

function renderManage() {
  document.getElementById('manage-list').innerHTML = products.map(p => `
    <div class="manage-card" style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:22px;">${p.icon||'🍪'}</span>
        <div>
          <div class="product-name">${p.name}</div>
          <div class="product-meta">${metaStr(p)} · Stock: ${p.stock.toLocaleString()} pcs</div>
        </div>
      </div>
      <div class="manage-actions">
        <button class="icon-btn" onclick="openModal(${p.id})" aria-label="Edit">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn del" onclick="deleteProduct(${p.id})" aria-label="Delete">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function showScreen(name) {
  ['stock','log','manage'].forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('active', s===name);
    document.getElementById('nav-'+s).classList.toggle('active', s===name);
  });
  if (name==='log') renderLog();
  if (name==='manage') renderManage();
  if (name==='stock') renderStock();
}

function openModal(id) {
  editingId = id || null;
  selectedIcon = '🍪';
  document.getElementById('modal-title').textContent = id ? 'Edit product' : 'Add product';
  if (id) {
    const p = products.find(x => x.id===id);
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-type').value = p.type;
    document.getElementById('f-packets').value = p.packets||'';
    document.getElementById('f-pcs').value = p.pcs||'';
    document.getElementById('f-units').value = p.units||'';
    document.getElementById('f-threshold').value = p.threshold||50;
    selectedIcon = p.icon||'🍪';
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-type').value = 'carton';
    document.getElementById('f-packets').value = '';
    document.getElementById('f-pcs').value = '';
    document.getElementById('f-units').value = '';
    document.getElementById('f-threshold').value = '50';
  }
  togglePackType();
  renderIconPicker();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function togglePackType() {
  const t = document.getElementById('f-type').value;
  document.getElementById('carton-fields').style.display = t==='carton'?'':'none';
  document.getElementById('box-fields').style.display = t==='box'?'':'none';
}

function renderIconPicker() {
  document.getElementById('icon-picker').innerHTML = ICONS.map(ic => `
    <span onclick="selectIcon('${ic}')" style="font-size:24px;cursor:pointer;padding:4px;border-radius:8px;border:2px solid ${ic===selectedIcon?'var(--green-dark)':'transparent'};transition:border 0.1s;" id="icon-${ic}">${ic}</span>
  `).join('');
}

function selectIcon(ic) {
  selectedIcon = ic;
  renderIconPicker();
}

function saveProduct() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Please enter a product name'); return; }
  const type = document.getElementById('f-type').value;
  const threshold = parseInt(document.getElementById('f-threshold').value)||50;
  if (editingId) {
    const p = products.find(x => x.id===editingId);
    Object.assign(p, { name, type, threshold, icon: selectedIcon });
    if (type==='carton') { p.packets=parseInt(document.getElementById('f-packets').value)||30; p.pcs=parseInt(document.getElementById('f-pcs').value)||24; }
    else { p.units=parseInt(document.getElementById('f-units').value)||20; }
  } else {
    const np = { id: Date.now(), name, type, threshold, stock:0, icon: selectedIcon };
    if (type==='carton') { np.packets=parseInt(document.getElementById('f-packets').value)||30; np.pcs=parseInt(document.getElementById('f-pcs').value)||24; }
    else { np.units=parseInt(document.getElementById('f-units').value)||20; }
    products.push(np);
  }
  saveData();
  closeModal();
  showToast(editingId ? 'Product updated ✓' : 'Product added ✓');
  renderManage();
  renderStock();
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  products = products.filter(x => x.id!==id);
  saveData();
  showToast('Product deleted');
  renderManage();
  renderStock();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = new Date();
document.getElementById('topbar-date').textContent =
  `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

function resetInventory() {
  if (!confirm('Reset all inventory data?')) return;

  localStorage.removeItem('ts2_products');
  localStorage.removeItem('ts2_log');

  products = defaultProducts();
  log = [];

  saveData();

  renderStock();
  renderLog();
  renderManage();

  showToast('Inventory reset successfully');
}

loadData();
renderStock();
</script>
</body>
</html>
